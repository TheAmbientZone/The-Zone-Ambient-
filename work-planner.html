<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#eceae1">
<title>Babar's Work Planner</title>
<style>
  :root{ --paper:#eceae1; --paper2:#f6f4ee; --navy:#16204c; --navy2:#26305e; --red:#d22b1b; --green:#1f7a3d; --amber:#b06a00; --dim:#717693; --line:#c9c6ba;
    --face:'Helvetica Neue',Helvetica,Arial,sans-serif; --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--navy); font-family:var(--face); min-height:100dvh; -webkit-font-smoothing:antialiased;
    padding:22px 16px calc(40px + env(safe-area-inset-bottom))}
  .wrap{max-width:640px; margin:0 auto}
  button{font-family:inherit; cursor:pointer}

  .masthead{border-top:2px solid var(--navy); border-bottom:1px solid var(--navy); padding:10px 0 12px; position:relative}
  .masthead h1{margin:0; font-size:clamp(22px,6.2vw,33px); font-weight:700; letter-spacing:-.015em; max-width:72%}
  .masthead h1 sup{font-size:.36em; vertical-align:super; font-weight:600}
  .masthead .tag{font-size:12px; margin-top:4px}
  .masthead .today{position:absolute; top:10px; right:0; text-align:right; font-family:var(--mono); font-size:9px; letter-spacing:.08em; color:var(--navy2); line-height:1.5}
  .masthead .today b{font-size:15px; display:block; color:var(--navy)}

  .tabs{display:flex; margin:16px 0 4px; border:1px solid var(--navy); border-radius:2px; overflow:hidden}
  .tabs button{flex:1; font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; padding:11px 4px; background:var(--paper2); border:0; border-right:1px solid var(--line); color:var(--navy2)}
  .tabs button:last-child{border-right:0}
  .tabs button[aria-selected="true"]{background:var(--navy); color:var(--paper)}
  .tabs button .cnt{opacity:.6; font-size:9px}

  section{display:none} section.on{display:block}
  .rule{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:18px 2px 9px; display:flex; justify-content:space-between; align-items:baseline}

  /* objective card */
  .obj{background:var(--paper2); border:1px solid var(--line); border-radius:2px; margin-bottom:10px; overflow:hidden}
  .obj .ohead{width:100%; text-align:left; background:none; border:0; color:inherit; padding:13px 14px; display:block}
  .obj .otop{display:flex; align-items:baseline; gap:8px}
  .obj .otop .onm{flex:1; min-width:0; font-size:16.5px; font-weight:700; line-height:1.2}
  .obj .otop .opct{font-family:var(--mono); font-size:15px; font-weight:600}
  .bar{height:7px; background:#dcd9cf; border:1px solid var(--line); border-radius:999px; margin-top:9px; overflow:hidden}
  .bar i{display:block; height:100%; background:var(--navy); border-radius:999px}
  .bar i.ontrack{background:var(--green)} .bar i.atrisk{background:var(--amber)} .bar i.offtrack{background:var(--red)} .bar i.done{background:var(--navy)}
  .osub{display:flex; gap:8px; align-items:center; margin-top:8px; flex-wrap:wrap}
  .rag{font-family:var(--mono); font-size:8px; letter-spacing:.12em; text-transform:uppercase; padding:2px 6px; border:1px solid currentColor; border-radius:2px}
  .rag.ontrack{color:var(--green)} .rag.atrisk{color:var(--amber)} .rag.offtrack{color:var(--red)} .rag.done{color:var(--navy)}
  .osub .meta{font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; color:var(--navy2)}
  .osub .meta.over{color:var(--red)}
  .obody{display:none; padding:0 14px 14px; border-top:1px dashed var(--line)}
  .obj.open .obody{display:block}
  .lane h5{font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:14px 0 5px; font-weight:400; display:flex; justify-content:space-between}

  /* action row */
  .act{display:flex; gap:10px; align-items:flex-start; padding:9px 2px; border-bottom:1px solid var(--line)}
  .chip{flex:0 0 auto; font-family:var(--mono); font-size:8px; letter-spacing:.08em; text-transform:uppercase; padding:4px 7px; border-radius:999px; border:1px solid var(--line); color:var(--navy2); background:var(--paper); margin-top:1px; white-space:nowrap}
  .chip.doing{background:var(--amber); color:#fff; border-color:var(--amber)}
  .chip.done{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .chip.backlog{background:var(--paper)}
  .act .atx{flex:1; min-width:0}
  .act .atx .a{font-size:14.5px; line-height:1.3}
  .act.is-done .atx .a{text-decoration:line-through; color:var(--dim)}
  .act .atx .am{font-family:var(--mono); font-size:9px; letter-spacing:.04em; color:var(--navy2); margin-top:3px; display:flex; gap:7px; flex-wrap:wrap}
  .act .atx .am .over{color:var(--red)} .act .atx .am .tod{color:var(--amber)}
  .sz{font-family:var(--mono); font-size:8px; border:1px solid var(--line); border-radius:2px; padding:1px 4px; color:var(--navy2)}
  .act .ico{flex:0 0 auto; background:none; border:0; color:var(--navy2); font-family:var(--mono); font-size:14px; padding:2px 4px}
  .objname{font-family:var(--mono); font-size:9px; letter-spacing:.05em; color:var(--navy2)}

  .empty{font-size:13px; color:var(--dim); font-style:italic; padding:14px 2px}
  .dayblk{margin-top:14px}
  .dayblk .dh{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--navy); border-bottom:1px solid var(--navy); padding-bottom:4px; margin-bottom:2px; display:flex; justify-content:space-between}
  .dayblk .dh.today{color:var(--red)} .dayblk .dh .rel{color:var(--dim)}

  .btn{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy); background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:8px 13px}
  .btn:hover,.btn:focus-visible{border-color:var(--navy); outline:none}
  .btn.red{color:var(--red)} .btn.solid{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .btnrow{display:flex; gap:7px; flex-wrap:wrap; margin-top:12px}
  .add{width:100%; margin-top:10px; padding:13px; background:none; border:1px dashed var(--navy2); border-radius:2px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--navy2)}
  .add:hover{border-style:solid}
  .foot{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-top:26px}
  .note{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; color:var(--dim); text-align:center; margin-top:14px; line-height:1.7}

  .scrim{position:fixed; inset:0; background:rgba(16,18,26,.42); display:none; align-items:flex-end; justify-content:center; z-index:30}
  .scrim.on{display:flex}
  .sheet{background:var(--paper); width:100%; max-width:640px; max-height:92dvh; overflow:auto; border-radius:10px 10px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); border-top:3px solid var(--navy)}
  .sheet h3{margin:0 0 4px; font-size:19px} .sheet .sh{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy2); margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%; font-family:var(--face); font-size:16px; color:var(--navy); background:var(--paper2); border:1px solid var(--line); border-radius:2px; padding:11px 12px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--navy)}
  .hintln{font-family:var(--mono); font-size:9px; color:var(--dim); margin-top:-7px; margin-bottom:13px; line-height:1.5}
  .seg{display:flex; gap:6px} .seg button{flex:1; font-family:var(--mono); font-size:10px; letter-spacing:.04em; text-transform:uppercase; padding:10px 4px; background:var(--paper2); border:1px solid var(--line); border-radius:2px; color:var(--navy2)}
  .seg button[aria-pressed="true"]{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .row2{display:flex; gap:10px} .row2 .field{flex:1}
  .sheetbtns{display:flex; gap:9px; margin-top:18px} .sheetbtns .btn{flex:1; text-align:center; padding:13px; font-size:11px}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:var(--paper); font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:10px 16px; border-radius:999px; opacity:0; transition:.25s; z-index:40; pointer-events:none}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  .warn{background:#fff4f2; border:1px solid var(--red); color:var(--red); font-size:12px; padding:10px 12px; border-radius:2px; margin-top:12px}
  :focus-visible{outline:2px solid var(--red); outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Work Planner<sup>®</sup></h1>
    <div class="tag">objectives · actions · progress through the workflow</div>
    <div class="today" id="todayBox"></div>
  </div>

  <div id="store-warn"></div>

  <div class="tabs" role="tablist">
    <button role="tab" aria-selected="true" data-tab="today" id="tab-today">Today <span class="cnt" id="c-today"></span></button>
    <button role="tab" aria-selected="false" data-tab="objs" id="tab-objs">Objectives <span class="cnt" id="c-objs"></span></button>
    <button role="tab" aria-selected="false" data-tab="week" id="tab-week">Week <span class="cnt" id="c-week"></span></button>
  </div>

  <!-- TODAY -->
  <section class="on" id="s-today">
    <div class="rule"><span>Due, overdue & in progress</span><span id="todaySum" style="color:var(--navy2)"></span></div>
    <div id="todayList"></div>
    <button class="add" id="addActionToday" type="button">＋ add an action</button>
  </section>

  <!-- OBJECTIVES -->
  <section id="s-objs">
    <div id="objList"></div>
    <button class="add" id="addObj" type="button">＋ add an objective</button>
  </section>

  <!-- WEEK -->
  <section id="s-week">
    <div class="rule"><span id="weekLbl">This week</span><span id="weekSum" style="color:var(--navy2)"></span></div>
    <div id="weekList"></div>
  </section>

  <div class="foot">
    <button class="btn" id="exportBtn" type="button">⤓ backup</button>
    <button class="btn" id="importBtn" type="button">⤒ restore</button>
  </div>
  <p class="note">SAVED IN THIS BROWSER ONLY · BACK UP NOW &amp; THEN · NOTHING IS UPLOADED</p>
</div>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileIn" accept="application/json,.json" style="display:none">

<script>
"use strict";
const $=id=>document.getElementById(id);
const KEY='babar.worklog.v1';
let DB={objectives:[],actions:[]};
let storageOK=true, tab='today';
const STATUS=['backlog','doing','done'];
const SIZES=[{k:'S',w:1},{k:'M',w:2},{k:'L',w:3},{k:'XL',w:5}];
const sizeLabel=w=>{ let best=SIZES[0]; SIZES.forEach(s=>{ if(Math.abs(s.w-w)<Math.abs(best.w-w)) best=s; }); return best.k; };

function load(){ try{ const v=localStorage.getItem(KEY); if(v) DB=JSON.parse(v); }catch(e){ storageOK=false; } DB.objectives=DB.objectives||[]; DB.actions=DB.actions||[]; }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ storageOK=false; warnStore(); } }
function warnStore(){ $('store-warn').innerHTML='<div class="warn">This browser is blocking local storage (often private-mode). Entries won\u2019t persist here \u2014 use Backup to keep a copy.</div>'; }
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const pad=n=>String(n).padStart(2,'0');
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function relDay(ds){ const t=parseDate(todayStr()), d=parseDate(ds); const n=Math.round((d-t)/86400000);
  if(n===0)return'today'; if(n===1)return'tomorrow'; if(n===-1)return'yesterday'; if(n>1&&n<14)return'in '+n+' days'; if(n<0)return Math.abs(n)+' days ago'; return''; }
function fmtDay(ds){ const d=parseDate(ds); return DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]; }
(function(){ const d=new Date(); $('todayBox').innerHTML='<b>'+DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]+'</b>'+d.getFullYear(); })();

// ── model helpers ──────────────────────────────────────────────────────────
function objById(id){ return DB.objectives.find(o=>o.id===id); }
function objActions(id){ return DB.actions.filter(a=>a.objId===id); }
function progress(o){ if(o.manualPct!=null&&o.manualPct!=='') return clamp(+o.manualPct,0,100);
  const acts=objActions(o.id); if(!acts.length) return 0;
  const tot=acts.reduce((s,a)=>s+(a.weight||1),0), done=acts.reduce((s,a)=>s+(a.status==='done'?(a.weight||1):0),0);
  return tot?Math.round(done/tot*100):0; }
function isManual(o){ return o.manualPct!=null&&o.manualPct!==''; }
// auto-RAG derived from due dates + pace toward target
function rag(o){ const prog=progress(o); if(prog>=100) return {k:'done',label:'complete'};
  const today=todayStr(); const acts=objActions(o.id); const overdue=acts.filter(a=>a.status!=='done'&&a.due&&a.due<today).length;
  let lvl=0;
  if(o.target){ if(o.target<today){ lvl=2; }
    else { const created=o.ts||Date.now(); const tgt=parseDate(o.target).getTime()+86400000; const span=tgt-created;
      const exp=span>0?clamp((Date.now()-created)/span,0,1)*100:0; const gap=prog-exp; lvl=gap>=-10?0:gap>=-30?1:2; } }
  if(overdue>0) lvl=Math.max(lvl,1); if(overdue>=3) lvl=2;
  return {k:['ontrack','atrisk','offtrack'][lvl], label:['on track','at risk','off track'][lvl]}; }

function nextStatus(s){ return STATUS[(STATUS.indexOf(s)+1)%STATUS.length]; }
function cycleAction(id){ const a=DB.actions.find(x=>x.id===id); if(!a)return; a.status=nextStatus(a.status||'backlog'); save(); renderAll(); }

// ── TODAY ──────────────────────────────────────────────────────────────────
function todayActions(){ const today=todayStr();
  return DB.actions.filter(a=>a.status!=='done' && ((a.due&&a.due<=today)||a.status==='doing'))
    .sort((a,b)=>{ const ao=a.due&&a.due<today?0:a.due===today?1:2, bo=b.due&&b.due<today?0:b.due===today?1:2;
      if(ao!==bo)return ao-bo; return (a.due||'~').localeCompare(b.due||'~'); }); }
function actionRow(a, showObj){ const today=todayStr(); const o=objById(a.objId);
  const meta=[]; if(a.due){ const cls=a.status!=='done'&&a.due<today?'over':a.due===today?'tod':''; meta.push(`<span class="${cls}">${a.due<today&&a.status!=='done'?'overdue · ':''}${fmtDay(a.due)}</span>`); }
  meta.push(`<span class="sz">${sizeLabel(a.weight||1)}</span>`);
  if(showObj&&o) meta.push(`<span class="objname">▸ ${esc(o.title)}</span>`);
  return `<div class="act ${a.status==='done'?'is-done':''}">
    <button class="chip ${a.status||'backlog'}" data-cycle="${a.id}" aria-label="advance status">${a.status||'backlog'}</button>
    <div class="atx"><div class="a">${esc(a.text)}</div><div class="am">${meta.join('')}</div></div>
    <button class="ico" data-act-edit="${a.id}" aria-label="edit">⋯</button></div>`; }
function renderToday(){ const list=todayActions(); const today=todayStr();
  const over=list.filter(a=>a.due&&a.due<today).length, doing=list.filter(a=>a.status==='doing').length;
  $('c-today').textContent=list.length?'·'+list.length:''; $('todaySum').textContent=list.length?`${over} overdue · ${doing} in progress`:'';
  $('todayList').innerHTML=list.length?list.map(a=>actionRow(a,true)).join(''):'<div class="empty">nothing due or in progress. Open an objective to pull work forward.</div>';
}

// ── OBJECTIVES (with workflow lanes) ───────────────────────────────────────
function renderObjs(){ $('c-objs').textContent=DB.objectives.length?'·'+DB.objectives.length:'';
  if(!DB.objectives.length){ $('objList').innerHTML='<div class="empty">no objectives yet. Start with one big goal below.</div>'; return; }
  $('objList').innerHTML=DB.objectives.map(o=>{ const p=progress(o), r=rag(o), acts=objActions(o.id);
    const lanes=STATUS.map(st=>{ const rows=acts.filter(a=>(a.status||'backlog')===st);
      const body=rows.length?rows.map(a=>actionRow(a,false)).join(''):'<div class="empty" style="padding:6px 2px">—</div>';
      return `<div class="lane"><h5><span>${st}</span><span>${rows.length||''}</span></h5>${body}</div>`; }).join('');
    const tgt=o.target?`<span class="meta ${o.target<todayStr()&&p<100?'over':''}">target ${fmtDay(o.target)}${relDay(o.target)?' · '+relDay(o.target):''}</span>`:'<span class="meta">no target date</span>';
    return `<div class="obj" id="ob-${o.id}">
      <button class="ohead" type="button" data-obj-toggle="${o.id}">
        <div class="otop"><span class="onm">${esc(o.title)}</span><span class="opct">${p}%</span></div>
        <div class="bar"><i class="${r.k}" style="width:${p}%"></i></div>
        <div class="osub"><span class="rag ${r.k}">${r.label}</span>${tgt}${isManual(o)?'<span class="meta">· manual %</span>':'<span class="meta">· '+acts.length+' actions</span>'}</div>
      </button>
      <div class="obody">
        ${lanes}
        <div class="btnrow">
          <button class="btn solid" data-add-action="${o.id}" type="button">＋ action</button>
          <button class="btn" data-obj-edit="${o.id}" type="button">edit objective</button>
          <button class="btn red" data-obj-del="${o.id}" type="button">delete</button>
        </div>
      </div></div>`; }).join('');
}

// ── WEEK ───────────────────────────────────────────────────────────────────
function weekDays(){ const t=parseDate(todayStr()); const dow=(t.getDay()+6)%7; const mon=new Date(t); mon.setDate(t.getDate()-dow);
  const out=[]; for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i); out.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())); } return out; }
function renderWeek(){ const days=weekDays(), today=todayStr();
  $('weekLbl').textContent='Week of '+fmtDay(days[0]);
  const dated=DB.actions.filter(a=>a.due);
  const inWeek=dated.filter(a=>a.due>=days[0]&&a.due<=days[6]&&a.status!=='done').length;
  $('c-week').textContent=inWeek?'·'+inWeek:''; 
  const overdue=dated.filter(a=>a.due<today&&a.status!=='done').sort((a,b)=>a.due.localeCompare(b.due));
  let html='';
  if(overdue.length) html+=`<div class="dayblk"><div class="dh"><span style="color:var(--red)">Overdue</span><span class="rel">${overdue.length}</span></div>${overdue.map(a=>actionRow(a,true)).join('')}</div>`;
  days.forEach(ds=>{ const items=dated.filter(a=>a.due===ds).sort((a,b)=>(a.status==='done'?1:0)-(b.status==='done'?1:0));
    html+=`<div class="dayblk"><div class="dh ${ds===today?'today':''}"><span>${fmtDay(ds)}</span><span class="rel">${ds===today?'today':relDay(ds)}</span></div>${items.length?items.map(a=>actionRow(a,true)).join(''):'<div class="empty" style="padding:8px 2px">—</div>'}</div>`; });
  $('weekSum').textContent=inWeek?inWeek+' open':''; $('weekList').innerHTML=html;
}

function renderAll(){ renderToday(); renderObjs(); renderWeek(); }

// ── forms ──────────────────────────────────────────────────────────────────
function openSheet(html){ $('sheet').innerHTML=html; $('scrim').classList.add('on'); }
function closeSheet(){ $('scrim').classList.remove('on'); }
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) closeSheet(); });

function objForm(o){ const isNew=!o; o=o||{title:'',target:'',note:'',manualPct:''};
  openSheet(`
  <h3>${isNew?'New objective':'Objective'}</h3><div class="sh">a high-level goal</div>
  <div class="field"><label>objective</label><input id="o-title" value="${esc(o.title)}" placeholder="e.g. Launch the new onboarding flow"></div>
  <div class="field"><label>target date (optional)</label><input id="o-target" type="date" value="${o.target||''}"></div>
  <div class="hintln">progress &amp; on-track status are worked out from your actions. Leave the override blank unless you want to set the % by hand.</div>
  <div class="field"><label>progress override % (optional)</label><input id="o-manual" type="number" min="0" max="100" value="${o.manualPct!=null?o.manualPct:''}" placeholder="auto" inputmode="numeric"></div>
  <div class="field"><label>note</label><input id="o-note" value="${esc(o.note||'')}" placeholder="optional"></div>
  <div class="sheetbtns">${isNew?'':'<button class="btn red" type="button" id="o-del">delete</button>'}<button class="btn" type="button" id="o-cancel">cancel</button><button class="btn solid" type="button" id="o-save">save</button></div>`);
  $('o-cancel').addEventListener('click',closeSheet);
  if($('o-del')) $('o-del').addEventListener('click',()=>{ if(confirm('Delete this objective and all its actions?')){ DB.objectives=DB.objectives.filter(x=>x.id!==o.id); DB.actions=DB.actions.filter(a=>a.objId!==o.id); save(); closeSheet(); renderAll(); toast('deleted'); } });
  $('o-save').addEventListener('click',()=>{ const title=$('o-title').value.trim(); if(!title){toast('give it a title');return;}
    const mv=$('o-manual').value.trim(); const rec=isNew?{id:uid(),ts:Date.now(),actions:undefined}:o;
    rec.title=title; rec.target=$('o-target').value||''; rec.note=$('o-note').value.trim(); rec.manualPct=mv===''?null:clamp(parseInt(mv,10)||0,0,100);
    if(isNew) DB.objectives.push(rec); save(); closeSheet(); renderAll(); toast(isNew?'objective added':'saved'); });
}

function actionForm(a, presetObj){ const isNew=!a;
  if(isNew && !DB.objectives.length){ toast('add an objective first'); selectTab('objs'); return; }
  a=a||{text:'',objId:presetObj||DB.objectives[0].id,status:'backlog',due:'',weight:1};
  const objOpts=DB.objectives.map(o=>`<option value="${o.id}" ${a.objId===o.id?'selected':''}>${esc(o.title)}</option>`).join('');
  openSheet(`
  <h3>${isNew?'New action':'Action'}</h3><div class="sh">a unit of work toward an objective</div>
  <div class="field"><label>action</label><input id="a-text" value="${esc(a.text)}" placeholder="e.g. Draft the spec"></div>
  <div class="field"><label>objective</label><select id="a-obj">${objOpts}</select></div>
  <div class="row2">
    <div class="field"><label>status</label><div class="seg" id="a-status">${STATUS.map(s=>`<button type="button" data-s="${s}" aria-pressed="${(a.status||'backlog')===s}">${s}</button>`).join('')}</div></div>
  </div>
  <div class="row2">
    <div class="field"><label>due (optional)</label><input id="a-due" type="date" value="${a.due||''}"></div>
    <div class="field"><label>effort</label><div class="seg" id="a-size">${SIZES.map(s=>`<button type="button" data-w="${s.w}" aria-pressed="${(a.weight||1)===s.w}">${s.k}</button>`).join('')}</div></div>
  </div>
  <div class="sheetbtns">${isNew?'':'<button class="btn red" type="button" id="a-del">delete</button>'}<button class="btn" type="button" id="a-cancel">cancel</button><button class="btn solid" type="button" id="a-save">save</button></div>`);
  let status=a.status||'backlog', weight=a.weight||1;
  $('a-status').addEventListener('click',e=>{ const b=e.target.closest('[data-s]'); if(!b)return; status=b.dataset.s; $('a-status').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false')); });
  $('a-size').addEventListener('click',e=>{ const b=e.target.closest('[data-w]'); if(!b)return; weight=+b.dataset.w; $('a-size').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false')); });
  $('a-cancel').addEventListener('click',closeSheet);
  if($('a-del')) $('a-del').addEventListener('click',()=>{ DB.actions=DB.actions.filter(x=>x.id!==a.id); save(); closeSheet(); renderAll(); toast('deleted'); });
  $('a-save').addEventListener('click',()=>{ const tx=$('a-text').value.trim(); if(!tx){toast('action needs text');return;}
    const rec=isNew?{id:uid(),ts:Date.now()}:a; rec.text=tx; rec.objId=$('a-obj').value; rec.status=status; rec.due=$('a-due').value||''; rec.weight=weight;
    if(isNew) DB.actions.push(rec); save(); closeSheet(); renderAll(); const el=$('ob-'+rec.objId); if(el)el.classList.add('open'); toast(isNew?'action added':'saved'); });
}

// ── tabs / events ──────────────────────────────────────────────────────────
function selectTab(name){ tab=name; ['today','objs','week'].forEach(n=>{ $('s-'+n).classList.toggle('on',n===name); $('tab-'+n).setAttribute('aria-selected',n===name?'true':'false'); }); }
document.querySelector('.tabs').addEventListener('click',e=>{ const b=e.target.closest('[data-tab]'); if(b) selectTab(b.dataset.tab); });
document.addEventListener('click',e=>{ const t=e.target;
  const cy=t.closest('[data-cycle]'); if(cy){ cycleAction(cy.dataset.cycle); return; }
  const ae=t.closest('[data-act-edit]'); if(ae){ const a=DB.actions.find(x=>x.id===ae.dataset.actEdit); if(a) actionForm(a); return; }
  const ot=t.closest('[data-obj-toggle]'); if(ot){ $('ob-'+ot.dataset.objToggle).classList.toggle('open'); return; }
  const aa=t.closest('[data-add-action]'); if(aa){ actionForm(null, aa.dataset.addAction); return; }
  const oe=t.closest('[data-obj-edit]'); if(oe){ const o=objById(oe.dataset.objEdit); if(o) objForm(o); return; }
  const od=t.closest('[data-obj-del]'); if(od){ const o=objById(od.dataset.objDel); if(o&&confirm('Delete "'+o.title+'" and all its actions?')){ DB.objectives=DB.objectives.filter(x=>x.id!==o.id); DB.actions=DB.actions.filter(a=>a.objId!==o.id); save(); renderAll(); toast('deleted'); } return; }
});
$('addObj').addEventListener('click',()=>objForm(null));
$('addActionToday').addEventListener('click',()=>actionForm(null));

// ── toast / backup ─────────────────────────────────────────────────────────
let tT=null; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),1900); }
function download(name,text,mime){ const b=new Blob([text],{type:mime||'text/plain'}); const u=URL.createObjectURL(b); const aEl=document.createElement('a'); aEl.href=u; aEl.download=name; document.body.appendChild(aEl); aEl.click(); aEl.remove(); setTimeout(()=>URL.revokeObjectURL(u),4000); }
// ── encrypted backup (AES-256-GCM + PBKDF2-SHA256) ──────────────────────────
const ENC_TAG='babar-aes-gcm-v1', KDF_ITER=300000, APP='work-planner', FILEBASE='work-planner';
function cryptoOK(){ return !!(window.crypto&&crypto.subtle); }
function b64(buf){ const b=new Uint8Array(buf); let s=''; const CH=0x8000; for(let i=0;i<b.length;i+=CH) s+=String.fromCharCode.apply(null,b.subarray(i,i+CH)); return btoa(s); }
function unb64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); }
async function deriveKey(pass,salt,iter){ const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']); return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }
async function encryptBackup(obj,pass){ const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12)); const key=await deriveKey(pass,salt,KDF_ITER); const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj))); return JSON.stringify({_enc:ENC_TAG,app:APP,kdf:'PBKDF2',hash:'SHA-256',iter:KDF_ITER,salt:b64(salt),iv:b64(iv),ct:b64(ct)},null,2); }
async function decryptBackup(env,pass){ const key=await deriveKey(pass,unb64(env.salt),env.iter||KDF_ITER); const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(env.iv)},key,unb64(env.ct)); return JSON.parse(new TextDecoder().decode(pt)); }
const HINTCSS='font-family:var(--mono);font-size:9px;color:var(--dim);margin:-6px 0 13px;line-height:1.5';
function exportJSON(){ openSheet(`
  <h3>Backup</h3><div class="sh">save a copy of your data</div>
  <div class="field"><label>passphrase — optional</label><input id="bk-pass" type="password" autocomplete="new-password" placeholder="blank = plain readable file"></div>
  <div style="${HINTCSS}">A passphrase locks the file with AES-256 encryption — store it somewhere safe, there is no recovery if you forget it. Leave blank for a plain file.</div>
  <div class="sheetbtns"><button class="btn" id="bk-cancel" type="button">cancel</button><button class="btn solid" id="bk-go" type="button">save backup</button></div>`);
  $('bk-cancel').addEventListener('click',closeSheet);
  $('bk-go').addEventListener('click',async()=>{ const pass=$('bk-pass').value;
    try{ if(pass){ if(!cryptoOK()){ toast('encryption not available here'); return; } const txt=await encryptBackup(DB,pass); download(FILEBASE+'-encrypted-'+todayStr()+'.json',txt,'application/json'); }
      else { download(FILEBASE+'-backup-'+todayStr()+'.json',JSON.stringify(DB,null,2),'application/json'); }
      closeSheet(); toast(pass?'encrypted backup saved':'backup saved'); }catch(e){ toast('backup failed'); } }); }
function applyRestore(d){ if(!d||!Array.isArray(d.objectives)||!Array.isArray(d.actions)){ toast('not a work-planner backup'); return; } DB={objectives:d.objectives,actions:d.actions}; save(); renderAll(); toast('restored'); }
function promptDecrypt(env){ if(!cryptoOK()){ toast('encryption not available here'); return; }
  openSheet(`<h3>Encrypted backup</h3><div class="sh">enter the passphrase to restore</div>
    <div class="field"><label>passphrase</label><input id="rs-pass" type="password" autocomplete="off"></div>
    <div class="sheetbtns"><button class="btn" id="rs-cancel" type="button">cancel</button><button class="btn solid" id="rs-go" type="button">restore</button></div>`);
  $('rs-cancel').addEventListener('click',closeSheet);
  $('rs-go').addEventListener('click',async()=>{ try{ const obj=await decryptBackup(env,$('rs-pass').value); closeSheet(); applyRestore(obj); }catch(e){ toast('wrong passphrase or corrupt file'); } }); }
$('exportBtn').addEventListener('click',exportJSON);
$('importBtn').addEventListener('click',()=>$('fileIn').click());
$('fileIn').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ let d; try{ d=JSON.parse(r.result); }catch(err){ toast('could not read that file'); $('fileIn').value=''; return; } if(d&&d._enc){ promptDecrypt(d); } else { applyRestore(d); } $('fileIn').value=''; }; r.readAsText(f); });

// ── boot ───────────────────────────────────────────────────────────────────
load(); if(!storageOK) warnStore(); renderAll();
</script>
</body>
