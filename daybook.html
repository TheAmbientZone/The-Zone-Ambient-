<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#eceae1">
<title>Babar's Daybook</title>
<style>
  :root{ --paper:#eceae1; --paper2:#f6f4ee; --navy:#16204c; --navy2:#26305e; --red:#d22b1b; --green:#1f7a3d; --amber:#b06a00; --dim:#717693; --line:#c9c6ba;
    --face:'Helvetica Neue',Helvetica,Arial,sans-serif; --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--navy); font-family:var(--face); min-height:100dvh; -webkit-font-smoothing:antialiased;
    padding:22px 16px calc(40px + env(safe-area-inset-bottom))}
  .wrap{max-width:600px; margin:0 auto}
  button{font-family:inherit; cursor:pointer}

  .masthead{border-top:2px solid var(--navy); border-bottom:1px solid var(--navy); padding:10px 0 12px; position:relative}
  .masthead h1{margin:0; font-size:clamp(22px,6.4vw,34px); font-weight:700; letter-spacing:-.015em; max-width:72%}
  .masthead h1 sup{font-size:.36em; vertical-align:super; font-weight:600}
  .masthead .tag{font-size:12px; margin-top:4px}
  .masthead .today{position:absolute; top:10px; right:0; text-align:right; font-family:var(--mono); font-size:9px; letter-spacing:.08em; color:var(--navy2); line-height:1.5}
  .masthead .today b{font-size:15px; display:block; color:var(--navy)}

  /* tabs */
  .tabs{display:flex; gap:0; margin:16px 0 4px; border:1px solid var(--navy); border-radius:2px; overflow:hidden}
  .tabs button{flex:1; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; padding:11px 4px; background:var(--paper2); border:0; border-right:1px solid var(--line); color:var(--navy2)}
  .tabs button:last-child{border-right:0}
  .tabs button[aria-selected="true"]{background:var(--navy); color:var(--paper)}
  .tabs button .cnt{opacity:.6; font-size:9px}

  section{display:none} section.on{display:block}
  .rule{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:18px 2px 9px; display:flex; justify-content:space-between}

  /* quick add */
  .qadd{display:flex; gap:8px; margin:14px 0 6px}
  .qadd input{flex:1; font-family:var(--face); font-size:16px; color:var(--navy); background:var(--paper2); border:1px solid var(--line); border-radius:2px; padding:12px 13px}
  .qadd input:focus{outline:none; border-color:var(--navy)}
  .qadd button{flex:0 0 auto; width:48px; background:var(--navy); color:var(--paper); border:1px solid var(--navy); border-radius:2px; font-size:22px; line-height:1}

  /* tasks: ruled checklist with capsule checkboxes */
  .task{display:flex; gap:12px; align-items:flex-start; padding:11px 2px; border-bottom:1px solid var(--line)}
  .cap{flex:0 0 auto; width:22px; height:22px; margin-top:1px; border:1.5px solid var(--navy2); border-radius:999px; background:var(--paper2); position:relative}
  .cap[aria-checked="true"]{background:var(--navy); border-color:var(--navy)}
  .cap[aria-checked="true"]::after{content:"✓"; color:var(--paper); font-size:13px; position:absolute; inset:0; display:flex; align-items:center; justify-content:center}
  .task .tx{flex:1; min-width:0}
  .task .tx .t{font-size:15.5px; line-height:1.3}
  .task.done .tx .t{text-decoration:line-through; color:var(--dim)}
  .task .tx .meta{font-family:var(--mono); font-size:9.5px; letter-spacing:.04em; color:var(--navy2); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap}
  .task .meta .over{color:var(--red)} .task .meta .tod{color:var(--amber)} .task .meta .pri{color:var(--red)}
  .task .ico{flex:0 0 auto; background:none; border:0; color:var(--navy2); font-family:var(--mono); font-size:14px; padding:2px 4px}

  /* appointments: diary grouped by day */
  .day{margin-top:14px}
  .day .dh{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--navy); border-bottom:1px solid var(--navy); padding-bottom:4px; margin-bottom:2px; display:flex; justify-content:space-between}
  .day .dh .rel{color:var(--dim)}
  .appt{display:flex; gap:12px; align-items:flex-start; padding:11px 2px; border-bottom:1px solid var(--line)}
  .appt .tm{flex:0 0 auto; width:58px; font-family:var(--mono); font-size:13px; color:var(--navy); padding-top:1px}
  .appt .tm.allday{font-size:9px; letter-spacing:.06em; color:var(--dim); text-transform:uppercase}
  .appt .ai{flex:1; min-width:0} .appt .ai .at{font-size:15.5px; font-weight:600; line-height:1.25}
  .appt .ai .al{font-family:var(--mono); font-size:10px; color:var(--navy2); margin-top:3px}
  .appt .ico{flex:0 0 auto; background:none; border:0; color:var(--navy2); font-family:var(--mono); font-size:14px; padding:2px 4px}

  /* notes: index cards */
  .ncard{background:var(--paper2); border:1px solid var(--line); border-left:3px solid var(--navy2); border-radius:2px; padding:12px 13px; margin-bottom:9px}
  .ncard .nt{font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-wrap:break-word}
  .ncard .nf{display:flex; justify-content:space-between; align-items:center; margin-top:8px}
  .ncard .ns{font-family:var(--mono); font-size:9px; letter-spacing:.06em; color:var(--dim)}
  .ncard .nb button{background:none; border:0; color:var(--navy2); font-family:var(--mono); font-size:13px; padding:2px 5px}
  .ncard .nb button.del{color:var(--red)}

  .empty{font-size:13px; color:var(--dim); font-style:italic; padding:14px 2px}
  .btn{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy); background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:8px 13px}
  .btn:hover,.btn:focus-visible{border-color:var(--navy); outline:none}
  .btn.red{color:var(--red)} .btn.solid{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .add{width:100%; margin-top:10px; padding:13px; background:none; border:1px dashed var(--navy2); border-radius:2px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--navy2)}
  .add:hover{border-style:solid}
  .foot{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-top:26px}
  .note{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; color:var(--dim); text-align:center; margin-top:14px; line-height:1.7}

  .scrim{position:fixed; inset:0; background:rgba(16,18,26,.42); display:none; align-items:flex-end; justify-content:center; z-index:30}
  .scrim.on{display:flex}
  .sheet{background:var(--paper); width:100%; max-width:600px; max-height:92dvh; overflow:auto; border-radius:10px 10px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); border-top:3px solid var(--navy)}
  .sheet h3{margin:0 0 4px; font-size:19px}
  .sheet .sh{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy2); margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%; font-family:var(--face); font-size:16px; color:var(--navy); background:var(--paper2); border:1px solid var(--line); border-radius:2px; padding:11px 12px}
  .field textarea{min-height:90px; resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--navy)}
  .seg{display:flex; gap:6px}
  .seg button{flex:1; font-family:var(--mono); font-size:10px; letter-spacing:.05em; text-transform:uppercase; padding:10px 6px; background:var(--paper2); border:1px solid var(--line); border-radius:2px; color:var(--navy2)}
  .seg button[aria-pressed="true"]{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .row2{display:flex; gap:10px} .row2 .field{flex:1}
  .sheetbtns{display:flex; gap:9px; margin-top:18px} .sheetbtns .btn{flex:1; text-align:center; padding:13px; font-size:11px}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:var(--paper); font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:10px 16px; border-radius:999px; opacity:0; transition:.25s; z-index:40; pointer-events:none}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  .warn{background:#fff4f2; border:1px solid var(--red); color:var(--red); font-size:12px; padding:10px 12px; border-radius:2px; margin-top:12px}
  :focus-visible{outline:2px solid var(--red); outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Daybook<sup>®</sup></h1>
    <div class="tag">tasks · appointments · the back of the envelope</div>
    <div class="today" id="todayBox"></div>
  </div>

  <div id="store-warn"></div>

  <div class="tabs" role="tablist">
    <button role="tab" aria-selected="true" data-tab="tasks" id="tab-tasks">To-do <span class="cnt" id="c-tasks"></span></button>
    <button role="tab" aria-selected="false" data-tab="appts" id="tab-appts">Diary <span class="cnt" id="c-appts"></span></button>
    <button role="tab" aria-selected="false" data-tab="notes" id="tab-notes">Notes <span class="cnt" id="c-notes"></span></button>
  </div>

  <!-- TASKS -->
  <section class="on" id="s-tasks">
    <div class="qadd"><input id="q-task" placeholder="add a task, press enter" enterkeyhint="done"><button id="q-task-btn" type="button" aria-label="add task">＋</button></div>
    <div id="taskList"></div>
    <div class="foot" id="taskFoot"></div>
  </section>

  <!-- APPOINTMENTS -->
  <section id="s-appts">
    <button class="add" id="addAppt" type="button">＋ add an appointment</button>
    <div class="rule"><span>Upcoming</span><span id="apToggle" style="cursor:pointer; color:var(--navy2)">show past</span></div>
    <div id="apptList"></div>
  </section>

  <!-- NOTES -->
  <section id="s-notes">
    <div class="qadd"><input id="q-note" placeholder="jot a quick idea…" enterkeyhint="done"><button id="q-note-btn" type="button" aria-label="add note">＋</button></div>
    <div id="noteList"></div>
  </section>

  <div class="foot">
    <button class="btn" id="exportBtn" type="button">⤓ backup</button>
    <button class="btn" id="importBtn" type="button">⤒ restore</button>
  </div>
  <p class="note">SAVED IN THIS BROWSER ONLY · BACK UP NOW &amp; THEN · NOTHING IS UPLOADED</p>
</div>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileIn" accept="application/json,.json" style="display:none">

<script>
"use strict";
const $=id=>document.getElementById(id);
const KEY='babar.daybook.v1';
let DB={tasks:[],appts:[],notes:[]};
let storageOK=true, showPast=false, tab='tasks';

function load(){ try{ const v=localStorage.getItem(KEY); if(v) DB=JSON.parse(v); }catch(e){ storageOK=false; } DB.tasks=DB.tasks||[]; DB.appts=DB.appts||[]; DB.notes=DB.notes||[]; }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ storageOK=false; warnStore(); } }
function warnStore(){ $('store-warn').innerHTML='<div class="warn">This browser is blocking local storage (often private-mode). Entries won\u2019t persist here \u2014 use Backup to keep a copy.</div>'; }
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const pad=n=>String(n).padStart(2,'0');
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(s){ if(!s)return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function relDay(ds){ const t=parseDate(todayStr()), d=parseDate(ds); const n=Math.round((d-t)/86400000);
  if(n===0)return'today'; if(n===1)return'tomorrow'; if(n===-1)return'yesterday'; if(n>1&&n<7)return'in '+n+' days'; if(n<0)return Math.abs(n)+' days ago'; return''; }
function fmtDayHeader(ds){ const d=parseDate(ds); return DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]; }

// ── today box ──
(function(){ const d=new Date(); $('todayBox').innerHTML='<b>'+DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]+'</b>'+d.getFullYear(); })();

// ── TASKS ──────────────────────────────────────────────────────────────────
function sortTasks(){ const order={high:0,norm:1,low:2};
  return DB.tasks.slice().sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const ad=a.due||'~', bd=b.due||'~'; if(ad!==bd) return ad<bd?-1:1;
    return (order[a.pri]??1)-(order[b.pri]??1) || (a.ts||0)-(b.ts||0); }); }
function renderTasks(){ const list=sortTasks(); const open=DB.tasks.filter(t=>!t.done).length;
  $('c-tasks').textContent=open?'·'+open:''; 
  if(!DB.tasks.length){ $('taskList').innerHTML='<div class="empty">nothing on the list. Add something above.</div>'; $('taskFoot').innerHTML=''; return; }
  const today=todayStr();
  $('taskList').innerHTML=list.map(t=>{ const meta=[];
    if(t.due){ const rel=relDay(t.due); const cls=(!t.done&&t.due<today)?'over':(!t.done&&t.due===today)?'tod':''; meta.push(`<span class="${cls}">${t.due<today&&!t.done?'overdue · ':''}${fmtDayHeader(t.due)}${rel?' ('+rel+')':''}</span>`); }
    if(t.pri==='high'&&!t.done) meta.push('<span class="pri">priority</span>');
    return `<div class="task ${t.done?'done':''}">
      <button class="cap" role="checkbox" aria-checked="${t.done?'true':'false'}" data-task-toggle="${t.id}" aria-label="toggle"></button>
      <div class="tx"><div class="t">${esc(t.text)}</div>${meta.length?`<div class="meta">${meta.join('')}</div>`:''}</div>
      <button class="ico" data-task-edit="${t.id}" aria-label="edit">⋯</button>
    </div>`; }).join('');
  const done=DB.tasks.filter(t=>t.done).length;
  $('taskFoot').innerHTML = done?`<button class="btn red" id="clearDone" type="button">clear ${done} completed</button>`:'';
  if($('clearDone')) $('clearDone').addEventListener('click',()=>{ DB.tasks=DB.tasks.filter(t=>!t.done); save(); renderTasks(); toast('cleared'); });
}
function addTask(text){ text=text.trim(); if(!text)return; DB.tasks.push({id:uid(),text,due:'',pri:'norm',done:false,ts:Date.now()}); save(); renderTasks(); }
function taskForm(t){ openSheet(`
  <h3>Task</h3><div class="sh">edit &amp; schedule</div>
  <div class="field"><label>task</label><input id="t-text" value="${esc(t.text)}"></div>
  <div class="row2">
    <div class="field"><label>due date</label><input id="t-due" type="date" value="${t.due||''}"></div>
    <div class="field"><label>priority</label><div class="seg" id="t-pri">
      <button type="button" data-p="high" aria-pressed="${t.pri==='high'}">high</button>
      <button type="button" data-p="norm" aria-pressed="${t.pri==='norm'||!t.pri}">normal</button>
      <button type="button" data-p="low" aria-pressed="${t.pri==='low'}">low</button></div></div>
  </div>
  <div class="sheetbtns"><button class="btn red" type="button" id="t-del">delete</button><button class="btn" type="button" id="t-cancel">cancel</button><button class="btn solid" type="button" id="t-save">save</button></div>`);
  let pri=t.pri||'norm'; $('t-pri').addEventListener('click',e=>{ const b=e.target.closest('[data-p]'); if(!b)return; pri=b.dataset.p; $('t-pri').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false')); });
  $('t-cancel').addEventListener('click',closeSheet);
  $('t-del').addEventListener('click',()=>{ DB.tasks=DB.tasks.filter(x=>x.id!==t.id); save(); closeSheet(); renderTasks(); toast('deleted'); });
  $('t-save').addEventListener('click',()=>{ const tx=$('t-text').value.trim(); if(!tx){toast('task can\u2019t be empty');return;} t.text=tx; t.due=$('t-due').value||''; t.pri=pri; save(); closeSheet(); renderTasks(); toast('saved'); });
}

// ── APPOINTMENTS ───────────────────────────────────────────────────────────
function renderAppts(){ const today=todayStr();
  let items=DB.appts.slice().sort((a,b)=>(a.date+(a.time||'99:99')).localeCompare(b.date+(b.time||'99:99')));
  const upcoming=items.filter(a=>a.date>=today); $('c-appts').textContent=upcoming.length?'·'+upcoming.length:'';
  let show=showPast?items:upcoming;
  if(!show.length){ $('apptList').innerHTML='<div class="empty">'+(showPast?'nothing in the diary yet.':'no upcoming appointments.')+'</div>'; return; }
  // group by date
  const groups={}; show.forEach(a=>{ (groups[a.date]=groups[a.date]||[]).push(a); });
  $('apptList').innerHTML=Object.keys(groups).sort().map(date=>{ const rel=relDay(date);
    const rows=groups[date].map(a=>{ const tm=a.time?a.time:'<span class="allday">all day</span>';
      return `<div class="appt"><div class="tm ${a.time?'':'allday'}">${tm}</div>
        <div class="ai"><div class="at">${esc(a.title)}</div>${(a.loc||a.note)?`<div class="al">${esc([a.loc,a.note].filter(Boolean).join(' · '))}</div>`:''}</div>
        <button class="ico" data-appt-cal="${a.id}" aria-label="add to calendar">🗓</button>
        <button class="ico" data-appt-edit="${a.id}" aria-label="edit">⋯</button></div>`; }).join('');
    return `<div class="day"><div class="dh"><span>${fmtDayHeader(date)}</span><span class="rel">${rel}</span></div>${rows}</div>`; }).join('');
}
function apptForm(a){ const isNew=!a; a=a||{date:todayStr(),time:'',title:'',loc:'',note:''};
  openSheet(`
  <h3>${isNew?'New appointment':'Appointment'}</h3><div class="sh">something with a time &amp; place</div>
  <div class="field"><label>what</label><input id="a-title" value="${esc(a.title)}" placeholder="e.g. Dentist"></div>
  <div class="row2">
    <div class="field"><label>date</label><input id="a-date" type="date" value="${a.date}"></div>
    <div class="field"><label>time (blank = all day)</label><input id="a-time" type="time" value="${a.time||''}"></div>
  </div>
  <div class="field"><label>where</label><input id="a-loc" value="${esc(a.loc||'')}" placeholder="optional"></div>
  <div class="field"><label>note</label><input id="a-note" value="${esc(a.note||'')}" placeholder="optional"></div>
  <div class="sheetbtns">${isNew?'':'<button class="btn red" type="button" id="a-del">delete</button>'}<button class="btn" type="button" id="a-cancel">cancel</button><button class="btn solid" type="button" id="a-save">save</button></div>`);
  $('a-cancel').addEventListener('click',closeSheet);
  if($('a-del')) $('a-del').addEventListener('click',()=>{ DB.appts=DB.appts.filter(x=>x.id!==a.id); save(); closeSheet(); renderAppts(); toast('deleted'); });
  $('a-save').addEventListener('click',()=>{ const title=$('a-title').value.trim(); const date=$('a-date').value; if(!title){toast('needs a title');return;} if(!date){toast('pick a date');return;}
    const rec=isNew?{id:uid()}:a; rec.title=title; rec.date=date; rec.time=$('a-time').value||''; rec.loc=$('a-loc').value.trim(); rec.note=$('a-note').value.trim();
    if(isNew) DB.appts.push(rec); save(); closeSheet(); renderAppts(); toast(isNew?'added':'saved'); });
}
// ICS for appointment
function dtFloating(date,time){ const [y,m,d]=date.split('-').map(Number); if(time){ const [hh,mm]=time.split(':').map(Number); return y+pad(m)+pad(d)+'T'+pad(hh)+pad(mm)+'00'; } return y+pad(m)+pad(d); }
function addDay(date){ const d=parseDate(date); d.setDate(d.getDate()+1); return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()); }
function icsEscape(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
function dtStampUTC(){ const d=new Date(); return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z'; }
function apptICS(a){ let dtstart,dtend;
  if(a.time){ dtstart='DTSTART:'+dtFloating(a.date,a.time); const [y,m,d]=a.date.split('-').map(Number); const [hh,mm]=a.time.split(':').map(Number); const end=new Date(y,m-1,d,hh,mm+60); dtend='DTEND:'+dtFloating(end.getFullYear()+'-'+pad(end.getMonth()+1)+'-'+pad(end.getDate()), pad(end.getHours())+':'+pad(end.getMinutes())); }
  else { dtstart='DTSTART;VALUE=DATE:'+dtFloating(a.date,''); dtend='DTEND;VALUE=DATE:'+addDay(a.date); }
  const ev=['BEGIN:VEVENT','UID:'+a.id+'@babar-daybook','DTSTAMP:'+dtStampUTC(),dtstart,dtend,
    'SUMMARY:'+icsEscape(a.title), (a.loc?'LOCATION:'+icsEscape(a.loc):''), (a.note?'DESCRIPTION:'+icsEscape(a.note):''),
    'BEGIN:VALARM','TRIGGER:-PT1H','ACTION:DISPLAY','DESCRIPTION:'+icsEscape(a.title),'END:VALARM','END:VEVENT'].filter(Boolean);
  return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Babar//Daybook//EN','CALSCALE:GREGORIAN'].concat(ev).concat(['END:VCALENDAR']).join('\r\n'); }
function downloadAppt(id){ const a=DB.appts.find(x=>x.id===id); if(!a)return; download((a.title||'event').replace(/\W+/g,'-').toLowerCase()+'.ics', apptICS(a),'text/calendar'); toast('added to calendar file'); }

// ── NOTES ──────────────────────────────────────────────────────────────────
function renderNotes(){ $('c-notes').textContent=DB.notes.length?'·'+DB.notes.length:'';
  if(!DB.notes.length){ $('noteList').innerHTML='<div class="empty">no notes yet. A place for stray thoughts.</div>'; return; }
  const items=DB.notes.slice().sort((a,b)=>b.ts-a.ts);
  $('noteList').innerHTML=items.map(n=>{ const d=new Date(n.ts);
    return `<div class="ncard"><div class="nt">${esc(n.text)}</div>
      <div class="nf"><span class="ns">${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]} · ${pad(d.getHours())}:${pad(d.getMinutes())}</span>
      <span class="nb"><button data-note-edit="${n.id}" aria-label="edit">edit</button><button class="del" data-note-del="${n.id}" aria-label="delete">✕</button></span></div></div>`; }).join('');
}
function addNote(text){ text=text.trim(); if(!text)return; DB.notes.push({id:uid(),text,ts:Date.now()}); save(); renderNotes(); }
function noteForm(n){ openSheet(`
  <h3>Note</h3><div class="sh">jot it down</div>
  <div class="field"><textarea id="n-text">${esc(n.text)}</textarea></div>
  <div class="sheetbtns"><button class="btn red" type="button" id="n-del">delete</button><button class="btn" type="button" id="n-cancel">cancel</button><button class="btn solid" type="button" id="n-save">save</button></div>`);
  $('n-cancel').addEventListener('click',closeSheet);
  $('n-del').addEventListener('click',()=>{ DB.notes=DB.notes.filter(x=>x.id!==n.id); save(); closeSheet(); renderNotes(); toast('deleted'); });
  $('n-save').addEventListener('click',()=>{ const tx=$('n-text').value.trim(); if(!tx){toast('empty note');return;} n.text=tx; n.ts=Date.now(); save(); closeSheet(); renderNotes(); toast('saved'); });
}

// ── sheet / toast / shared ─────────────────────────────────────────────────
function openSheet(html){ $('sheet').innerHTML=html; $('scrim').classList.add('on'); }
function closeSheet(){ $('scrim').classList.remove('on'); }
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) closeSheet(); });
let tT=null; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),1900); }
function download(name,text,mime){ const b=new Blob([text],{type:mime||'text/plain'}); const u=URL.createObjectURL(b); const aEl=document.createElement('a'); aEl.href=u; aEl.download=name; document.body.appendChild(aEl); aEl.click(); aEl.remove(); setTimeout(()=>URL.revokeObjectURL(u),4000); }

// ── tabs ───────────────────────────────────────────────────────────────────
function selectTab(name){ tab=name; ['tasks','appts','notes'].forEach(n=>{ $('s-'+n).classList.toggle('on',n===name); $('tab-'+n).setAttribute('aria-selected', n===name?'true':'false'); }); }
document.querySelector('.tabs').addEventListener('click',e=>{ const b=e.target.closest('[data-tab]'); if(b) selectTab(b.dataset.tab); });

// ── wiring ─────────────────────────────────────────────────────────────────
$('q-task-btn').addEventListener('click',()=>{ addTask($('q-task').value); $('q-task').value=''; $('q-task').focus(); });
$('q-task').addEventListener('keydown',e=>{ if(e.key==='Enter'){ addTask($('q-task').value); $('q-task').value=''; } });
$('q-note-btn').addEventListener('click',()=>{ addNote($('q-note').value); $('q-note').value=''; $('q-note').focus(); });
$('q-note').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); addNote($('q-note').value); $('q-note').value=''; } });
$('addAppt').addEventListener('click',()=>apptForm(null));
$('apToggle').addEventListener('click',()=>{ showPast=!showPast; $('apToggle').textContent=showPast?'hide past':'show past'; renderAppts(); });

document.addEventListener('click',e=>{ const t=e.target;
  const tt=t.closest('[data-task-toggle]'); if(tt){ const k=DB.tasks.find(x=>x.id===tt.dataset.taskToggle); if(k){ k.done=!k.done; save(); renderTasks(); } return; }
  const te=t.closest('[data-task-edit]'); if(te){ const k=DB.tasks.find(x=>x.id===te.dataset.taskEdit); if(k) taskForm(k); return; }
  const ac=t.closest('[data-appt-cal]'); if(ac){ downloadAppt(ac.dataset.apptCal); return; }
  const ae=t.closest('[data-appt-edit]'); if(ae){ const k=DB.appts.find(x=>x.id===ae.dataset.apptEdit); if(k) apptForm(k); return; }
  const ne=t.closest('[data-note-edit]'); if(ne){ const k=DB.notes.find(x=>x.id===ne.dataset.noteEdit); if(k) noteForm(k); return; }
  const nd=t.closest('[data-note-del]'); if(nd){ DB.notes=DB.notes.filter(x=>x.id!==nd.dataset.noteDel); save(); renderNotes(); toast('deleted'); return; }
});

// ── backup / restore ───────────────────────────────────────────────────────
// ── encrypted backup (AES-256-GCM + PBKDF2-SHA256) ──────────────────────────
const ENC_TAG='babar-aes-gcm-v1', KDF_ITER=300000, APP='daybook', FILEBASE='daybook';
function cryptoOK(){ return !!(window.crypto&&crypto.subtle); }
function b64(buf){ const b=new Uint8Array(buf); let s=''; const CH=0x8000; for(let i=0;i<b.length;i+=CH) s+=String.fromCharCode.apply(null,b.subarray(i,i+CH)); return btoa(s); }
function unb64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); }
async function deriveKey(pass,salt,iter){ const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']); return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }
async function encryptBackup(obj,pass){ const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12)); const key=await deriveKey(pass,salt,KDF_ITER); const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj))); return JSON.stringify({_enc:ENC_TAG,app:APP,kdf:'PBKDF2',hash:'SHA-256',iter:KDF_ITER,salt:b64(salt),iv:b64(iv),ct:b64(ct)},null,2); }
async function decryptBackup(env,pass){ const key=await deriveKey(pass,unb64(env.salt),env.iter||KDF_ITER); const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(env.iv)},key,unb64(env.ct)); return JSON.parse(new TextDecoder().decode(pt)); }
const HINTCSS='font-family:var(--mono);font-size:9px;color:var(--dim);margin:-6px 0 13px;line-height:1.5';
function exportJSON(){ openSheet(`
  <h3>Backup</h3><div class="sh">save a copy of your data</div>
  <div class="field"><label>passphrase — optional</label><input id="bk-pass" type="password" autocomplete="new-password" placeholder="blank = plain readable file"></div>
  <div style="${HINTCSS}">A passphrase locks the file with AES-256 encryption — store it somewhere safe, there is no recovery if you forget it. Leave blank for a plain file.</div>
  <div class="sheetbtns"><button class="btn" id="bk-cancel" type="button">cancel</button><button class="btn solid" id="bk-go" type="button">save backup</button></div>`);
  $('bk-cancel').addEventListener('click',closeSheet);
  $('bk-go').addEventListener('click',async()=>{ const pass=$('bk-pass').value;
    try{ if(pass){ if(!cryptoOK()){ toast('encryption not available here'); return; } const txt=await encryptBackup(DB,pass); download(FILEBASE+'-encrypted-'+todayStr()+'.json',txt,'application/json'); }
      else { download(FILEBASE+'-backup-'+todayStr()+'.json',JSON.stringify(DB,null,2),'application/json'); }
      closeSheet(); toast(pass?'encrypted backup saved':'backup saved'); }catch(e){ toast('backup failed'); } }); }
function applyRestore(d){ if(!d||(!Array.isArray(d.tasks)&&!Array.isArray(d.appts)&&!Array.isArray(d.notes))){ toast('not a daybook backup'); return; } DB={tasks:d.tasks||[],appts:d.appts||[],notes:d.notes||[]}; save(); renderTasks(); renderAppts(); renderNotes(); toast('restored'); }
function promptDecrypt(env){ if(!cryptoOK()){ toast('encryption not available here'); return; }
  openSheet(`<h3>Encrypted backup</h3><div class="sh">enter the passphrase to restore</div>
    <div class="field"><label>passphrase</label><input id="rs-pass" type="password" autocomplete="off"></div>
    <div class="sheetbtns"><button class="btn" id="rs-cancel" type="button">cancel</button><button class="btn solid" id="rs-go" type="button">restore</button></div>`);
  $('rs-cancel').addEventListener('click',closeSheet);
  $('rs-go').addEventListener('click',async()=>{ try{ const obj=await decryptBackup(env,$('rs-pass').value); closeSheet(); applyRestore(obj); }catch(e){ toast('wrong passphrase or corrupt file'); } }); }
$('exportBtn').addEventListener('click',exportJSON);
$('importBtn').addEventListener('click',()=>$('fileIn').click());
$('fileIn').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ let d; try{ d=JSON.parse(r.result); }catch(err){ toast('could not read that file'); $('fileIn').value=''; return; } if(d&&d._enc){ promptDecrypt(d); } else { applyRestore(d); } $('fileIn').value=''; }; r.readAsText(f); });

// ── boot ───────────────────────────────────────────────────────────────────
load(); if(!storageOK) warnStore(); renderTasks(); renderAppts(); renderNotes();
</script>
</body>
