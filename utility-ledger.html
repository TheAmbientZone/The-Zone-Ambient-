<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#eceae1">
<title>Babar's Utility Ledger</title>
<style>
  :root{ --paper:#eceae1; --paper2:#f6f4ee; --navy:#16204c; --navy2:#26305e; --red:#d22b1b; --green:#1f7a3d; --dim:#717693; --line:#c9c6ba;
    --face:'Helvetica Neue',Helvetica,Arial,sans-serif; --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace; }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--navy); font-family:var(--face); min-height:100dvh; -webkit-font-smoothing:antialiased;
    padding:22px 16px calc(40px + env(safe-area-inset-bottom))}
  .wrap{max-width:600px; margin:0 auto}
  button{font-family:inherit; cursor:pointer}

  /* masthead */
  .masthead{border-top:2px solid var(--navy); border-bottom:1px solid var(--navy); padding:10px 0 12px; position:relative}
  .masthead h1{margin:0; font-size:clamp(22px,6.4vw,34px); font-weight:700; letter-spacing:-.015em; max-width:74%}
  .masthead h1 sup{font-size:.36em; vertical-align:super; font-weight:600}
  .masthead .tag{font-size:12px; margin-top:4px}
  .sticker{position:absolute; top:10px; right:0; background:var(--navy); color:#fff; font-size:8.5px; line-height:1.35; padding:6px 8px; max-width:140px}

  .rule{font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:22px 2px 10px; display:flex; justify-content:space-between; align-items:baseline}
  .rule .r{color:var(--navy2)}

  /* statement */
  .stmt{background:var(--paper2); border:1px solid var(--navy); border-radius:2px; padding:14px 15px}
  .stmt .big{display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--line); padding-bottom:8px; margin-bottom:8px}
  .stmt .big .l{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim)}
  .stmt .big .v{font-family:var(--mono); font-size:26px; font-weight:600; letter-spacing:-.01em}
  .stmt .grid{display:grid; grid-template-columns:1fr 1fr; gap:7px 16px}
  .stmt .row{display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; gap:6px}
  .stmt .row .k{color:var(--navy2)} .stmt .row .lead{flex:1; border-bottom:1px dotted var(--line); margin:0 4px 3px} .stmt .row .n{font-family:var(--mono)}
  .bars{margin-top:12px}

  /* upcoming */
  .due{display:flex; gap:12px; align-items:center; background:var(--paper2); border:1px solid var(--line); border-left:3px solid var(--line); border-radius:2px; padding:11px 13px; margin-bottom:8px}
  .due.soon{border-left-color:var(--red)}
  .due .when{flex:0 0 auto; text-align:center; min-width:52px}
  .due .when .d{font-family:var(--mono); font-size:20px; font-weight:600; line-height:1} .due .when .m{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim)}
  .due .mid{flex:1; min-width:0} .due .mid .nm{font-size:15px; font-weight:700} .due .mid .sub{font-family:var(--mono); font-size:10px; color:var(--navy2); margin-top:2px}
  .due .amt{font-family:var(--mono); font-size:15px; flex:0 0 auto}
  .stamp{display:inline-block; font-family:var(--mono); font-size:8px; letter-spacing:.12em; padding:2px 5px; border:1px solid currentColor; border-radius:2px; vertical-align:middle; margin-left:6px}
  .stamp.red{color:var(--red)} .stamp.grn{color:var(--green)} .stamp.dim{color:var(--dim)}

  /* account cards */
  .acct{background:var(--paper2); border:1px solid var(--line); border-radius:2px; margin-bottom:9px; overflow:hidden}
  .acct .head{display:flex; gap:13px; align-items:center; padding:13px 14px; width:100%; text-align:left; background:none; border:0; color:inherit}
  .acct .code{flex:0 0 auto; width:48px; height:48px; border:1px solid var(--navy); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:12px; letter-spacing:.04em}
  .acct .ct{flex:1; min-width:0}
  .acct .ct .nm{font-size:16px; font-weight:700}
  .acct .ct .sub{font-family:var(--mono); font-size:10px; color:var(--navy2); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .acct .ct .due2{font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; color:var(--dim); margin-top:5px}
  .acct .chev{flex:0 0 auto; font-family:var(--mono); color:var(--navy2); transition:transform .2s}
  .acct.open .chev{transform:rotate(90deg)}
  .body{display:none; padding:0 14px 14px; border-top:1px dashed var(--line)}
  .acct.open .body{display:block}
  .body h4{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:14px 0 7px; font-weight:400}
  .log{font-family:var(--mono); font-size:12px}
  .log .lr{display:flex; gap:8px; align-items:baseline; padding:5px 0; border-bottom:1px dotted var(--line)}
  .log .lr .ym{width:62px; color:var(--navy2)} .log .lr .rd{flex:1; color:var(--dim)} .log .lr .am{width:74px; text-align:right}
  .log .lr .x{color:var(--red); padding:0 2px; background:none; border:0; font-family:var(--mono)}
  .empty{font-size:12px; color:var(--dim); font-style:italic; padding:4px 0}

  /* buttons */
  .btn{font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy); background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:8px 13px}
  .btn:hover,.btn:focus-visible{border-color:var(--navy); outline:none}
  .btn.red{color:var(--red)} .btn.solid{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .btnrow{display:flex; gap:7px; flex-wrap:wrap; margin-top:12px}
  .add{width:100%; margin-top:10px; padding:13px; background:none; border:1px dashed var(--navy2); border-radius:2px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--navy2)}
  .add:hover{border-style:solid}
  .foot{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-top:24px}
  .note{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; color:var(--dim); text-align:center; margin-top:14px; line-height:1.7}

  /* sheet (editor overlay) */
  .scrim{position:fixed; inset:0; background:rgba(16,18,26,.42); display:none; align-items:flex-end; justify-content:center; z-index:30}
  .scrim.on{display:flex}
  .sheet{background:var(--paper); width:100%; max-width:600px; max-height:92dvh; overflow:auto; border-radius:10px 10px 0 0; padding:18px 18px calc(20px + env(safe-area-inset-bottom)); border-top:3px solid var(--navy)}
  .sheet h3{margin:0 0 4px; font-size:19px}
  .sheet .sh{font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:14px}
  .field{margin-bottom:13px}
  .field label{display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--navy2); margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%; font-family:var(--face); font-size:16px; color:var(--navy); background:var(--paper2); border:1px solid var(--line); border-radius:2px; padding:11px 12px}
  .field textarea{min-height:64px; resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--navy)}
  .field.mono input{font-family:var(--mono)}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{flex:1; min-width:64px; font-family:var(--mono); font-size:10px; letter-spacing:.05em; text-transform:uppercase; padding:10px 6px; background:var(--paper2); border:1px solid var(--line); border-radius:2px; color:var(--navy2)}
  .seg button[aria-pressed="true"]{background:var(--navy); color:var(--paper); border-color:var(--navy)}
  .sheetbtns{display:flex; gap:9px; margin-top:18px}
  .sheetbtns .btn{flex:1; text-align:center; padding:13px; font-size:11px}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:var(--navy); color:var(--paper); font-family:var(--mono); font-size:11px; letter-spacing:.04em; padding:10px 16px; border-radius:999px; opacity:0; transition:.25s; z-index:40; pointer-events:none}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  :focus-visible{outline:2px solid var(--red); outline-offset:2px}
  .warn{background:#fff4f2; border:1px solid var(--red); color:var(--red); font-size:12px; padding:10px 12px; border-radius:2px; margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Utility Ledger<sup>®</sup></h1>
    <div class="tag">gas · electricity · water · everything that wants paying</div>
    <div class="sticker">Your bills, on your device. <b>Nothing leaves this phone.</b></div>
  </div>

  <div id="store-warn"></div>

  <div class="rule"><span>Statement — year to date</span><span class="r" id="yearLbl"></span></div>
  <div class="stmt" id="stmt"></div>

  <div class="rule"><span>Upcoming — next 30 days</span><span class="r" id="upCount"></span></div>
  <div id="upcoming"></div>

  <div class="rule"><span>Accounts</span><span class="r" id="acctCount"></span></div>
  <div id="accounts"></div>
  <button class="add" id="addAcct" type="button">＋ add an account</button>

  <div class="foot">
    <button class="btn" id="exportBtn" type="button">⤓ backup</button>
    <button class="btn" id="importBtn" type="button">⤒ restore</button>
    <button class="btn" id="calAllBtn" type="button">🗓 reminders for all manual bills</button>
  </div>
  <p class="note">SAVED IN THIS BROWSER ONLY · BACK UP NOW &amp; THEN · NOTHING IS UPLOADED</p>
</div>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileIn" accept="application/json,.json" style="display:none">

<script>
"use strict";
const $=id=>document.getElementById(id);
const CUR='£';
const TYPES=[
  {k:'electricity',code:'ELE'},{k:'gas',code:'GAS'},{k:'water',code:'H₂O'},
  {k:'broadband',code:'NET'},{k:'mobile',code:'MOB'},{k:'council tax',code:'C·T'},
  {k:'tv licence',code:'TV'},{k:'insurance',code:'INS'},{k:'rent',code:'RNT'},{k:'other',code:'GEN'}
];
const typeCode=k=>{const t=TYPES.find(t=>t.k===k); return t?t.code:'GEN';};
const KEY='babar.ledger.v1';
let DB={accounts:[]};
let storageOK=true;

function load(){ try{ const v=localStorage.getItem(KEY); if(v) DB=JSON.parse(v); }catch(e){ storageOK=false; } if(!DB.accounts)DB.accounts=[]; }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ storageOK=false; warnStore(); } }
function warnStore(){ $('store-warn').innerHTML='<div class="warn">This browser is blocking local storage (often private-mode). Your entries won\u2019t be saved between visits here \u2014 use Backup to keep a copy.</div>'; }
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function money(n){ n=+n||0; return CUR+n.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const pad=n=>String(n).padStart(2,'0');
function thisYear(){ return new Date().getFullYear(); }
function curYM(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1); }

// ── due-date maths ─────────────────────────────────────────────────────────
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); } // m: 0-11
function nextDue(dueDay, from){ from=from||new Date(); const today=new Date(from.getFullYear(),from.getMonth(),from.getDate());
  let y=today.getFullYear(), m=today.getMonth(); let day=Math.min(dueDay,daysInMonth(y,m)); let d=new Date(y,m,day);
  if(d<today){ m++; if(m>11){m=0;y++;} day=Math.min(dueDay,daysInMonth(y,m)); d=new Date(y,m,day); } return d; }
function daysUntil(date, from){ from=from||new Date(); const a=new Date(from.getFullYear(),from.getMonth(),from.getDate()); return Math.round((date-a)/86400000); }

// ── year-to-date snapshot ──────────────────────────────────────────────────
function ytd(){ const y=String(thisYear()); let total=0; const months={}; const byType={};
  DB.accounts.forEach(a=>{ (a.entries||[]).forEach(e=>{ if(typeof e.amount==='number' && e.ym && e.ym.startsWith(y)){ total+=e.amount; months[e.ym]=(months[e.ym]||0)+e.amount; byType[a.type]=(byType[a.type]||0)+e.amount; } }); });
  const mk=Object.keys(months).sort(); const avg=mk.length?total/mk.length:0;
  return {total, monthsWithData:mk.length, months, avg, projected:avg*12, byType}; }

function acctYTD(a){ const y=String(thisYear()); let t=0,c=0; (a.entries||[]).forEach(e=>{ if(typeof e.amount==='number'&&e.ym&&e.ym.startsWith(y)){t+=e.amount;c++;} }); return {total:t,count:c}; }

// ── rendering ──────────────────────────────────────────────────────────────
function svgBars(pairs){ // pairs:[{label,value}]
  if(!pairs.length) return '<div class="empty">no figures logged yet</div>';
  const W=Math.max(pairs.length*34,120), H=86, pad=18, max=Math.max.apply(null,pairs.map(p=>p.value)) || 1, bw=Math.min(22,(W-12)/pairs.length-6);
  let bars='';
  pairs.forEach((p,i)=>{ const x=6+i*((W-12)/pairs.length)+(((W-12)/pairs.length)-bw)/2; const h=Math.max(2,(p.value/max)*(H-pad-14)); const y=H-pad-h;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="#16204c"/>`;
    bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-pad+11}" font-size="7" font-family="ui-monospace,monospace" fill="#717693" text-anchor="middle">${p.label}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="xMinYMid meet" role="img" aria-label="monthly amounts"><line x1="6" y1="${H-pad}" x2="${W-6}" y2="${H-pad}" stroke="#c9c6ba"/>${bars}</svg>`;
}

function renderStmt(){ const s=ytd(); $('yearLbl').textContent=thisYear();
  const tRows=Object.keys(s.byType).sort((a,b)=>s.byType[b]-s.byType[a]).map(t=>
    `<div class="row"><span class="k">${t}</span><span class="lead"></span><span class="n">${money(s.byType[t])}</span></div>`).join('') || '<div class="row"><span class="k" style="color:var(--dim);font-style:italic">no figures yet</span></div>';
  const dueSoon=upcomingList().filter(u=>u.days<=30).length;
  const monthsPairs=Object.keys(s.months).sort().slice(-12).map(ym=>({label:MON[+ym.slice(5)-1], value:s.months[ym]}));
  $('stmt').innerHTML=
    `<div class="big"><span class="l">spent so far · ${thisYear()}</span><span class="v">${money(s.total)}</span></div>
     <div class="grid">
       <div class="row"><span class="k">monthly average</span><span class="lead"></span><span class="n">${money(s.avg)}</span></div>
       <div class="row"><span class="k">projected year</span><span class="lead"></span><span class="n">${money(s.projected)}</span></div>
       <div class="row"><span class="k">accounts</span><span class="lead"></span><span class="n">${DB.accounts.length}</span></div>
       <div class="row"><span class="k">due ≤30 days</span><span class="lead"></span><span class="n">${dueSoon}</span></div>
     </div>
     <h4 style="font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:13px 0 6px;font-weight:400">by category</h4>
     ${tRows}
     <div class="bars">${svgBars(monthsPairs)}</div>`;
}

function upcomingList(){ const out=[];
  DB.accounts.forEach(a=>{ if(!a.dueDay) return; const d=nextDue(a.dueDay); out.push({a, date:d, days:daysUntil(d)}); });
  return out.sort((x,y)=>x.date-y.date); }

function renderUpcoming(){ const list=upcomingList().filter(u=>u.days<=30); $('upCount').textContent=list.length?list.length+' bill'+(list.length>1?'s':''):'clear';
  if(!list.length){ $('upcoming').innerHTML='<div class="empty">nothing due in the next 30 days.</div>'; return; }
  $('upcoming').innerHTML=list.map(u=>{ const a=u.a; const soon=u.days<=7;
    const ddTag=a.dd?'<span class="stamp grn">DIRECT DEBIT</span>':'<span class="stamp red">PAY MANUALLY</span>';
    const dleft=u.days===0?'today':u.days===1?'tomorrow':'in '+u.days+' days';
    const calBtn=a.dd?'':`<button class="btn" data-cal="${a.id}" type="button" style="margin-left:8px">🗓 remind</button>`;
    return `<div class="due ${soon?'soon':''}">
      <div class="when"><div class="d">${u.date.getDate()}</div><div class="m">${MON[u.date.getMonth()]}</div></div>
      <div class="mid"><div class="nm">${esc(a.name)} ${ddTag}</div><div class="sub">${dleft}${a.amount?' · ~'+money(a.amount):''}${calBtn}</div></div>
      <div class="amt">${a.amount?money(a.amount):'—'}</div>
    </div>`; }).join('');
}

function renderAccounts(){ $('acctCount').textContent=DB.accounts.length||'none';
  if(!DB.accounts.length){ $('accounts').innerHTML='<div class="empty">no accounts yet — add your first below.</div>'; return; }
  $('accounts').innerHTML=DB.accounts.map(a=>{ const y=acctYTD(a); const nd=a.dueDay?nextDue(a.dueDay):null;
    const entries=(a.entries||[]).slice().sort((x,z)=>z.ym.localeCompare(x.ym));
    const logRows=entries.length?entries.map(e=>`<div class="lr"><span class="ym">${e.ym}</span><span class="rd">${e.reading!=null&&e.reading!==''?('read '+e.reading):(e.note?esc(e.note):'')}</span><span class="am">${e.amount!=null?money(e.amount):'—'}</span><button class="x" data-del-entry="${a.id}|${e.ym}" aria-label="delete">✕</button></div>`).join(''):'<div class="empty">no figures logged</div>';
    const barsPairs=(a.entries||[]).slice().sort((x,z)=>x.ym.localeCompare(z.ym)).slice(-12).filter(e=>typeof e.amount==='number').map(e=>({label:MON[+e.ym.slice(5)-1],value:e.amount}));
    return `<div class="acct" id="ac-${a.id}">
      <button class="head" type="button" data-toggle="${a.id}">
        <span class="code">${typeCode(a.type)}</span>
        <span class="ct"><span class="nm">${esc(a.name)}</span>
          <span class="sub">${a.type}${a.acct?' · a/c '+esc(a.acct):''}</span>
          <span class="due2">${a.dd?'direct debit':'pay manually'}${nd?' · next '+nd.getDate()+' '+MON[nd.getMonth()]:''} · ${thisYear()} ytd ${money(y.total)}</span>
        </span><span class="chev">›</span>
      </button>
      <div class="body">
        <h4>figures — month by month</h4>
        <div class="log">${logRows}</div>
        <div class="bars">${svgBars(barsPairs)}</div>
        <div class="btnrow">
          <button class="btn solid" data-add-entry="${a.id}" type="button">＋ log a figure</button>
          ${a.dd?'':`<button class="btn" data-cal="${a.id}" type="button">🗓 calendar reminder</button>`}
          <button class="btn" data-edit="${a.id}" type="button">edit</button>
          <button class="btn red" data-del="${a.id}" type="button">delete</button>
        </div>
      </div>
    </div>`; }).join('');
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function renderAll(){ renderStmt(); renderUpcoming(); renderAccounts(); }

// ── sheet / forms ──────────────────────────────────────────────────────────
function openSheet(html){ $('sheet').innerHTML=html; $('scrim').classList.add('on'); }
function closeSheet(){ $('scrim').classList.remove('on'); }
$('scrim').addEventListener('click',e=>{ if(e.target===$('scrim')) closeSheet(); });

function accountForm(existing){ const a=existing||{type:'electricity',dd:false};
  const typeOpts=TYPES.map(t=>`<option value="${t.k}" ${a.type===t.k?'selected':''}>${t.k}</option>`).join('');
  openSheet(`
    <h3>${existing?'Edit account':'New account'}</h3><div class="sh">a utility or bill</div>
    <div class="field"><label>provider / name</label><input id="f-name" value="${esc(a.name||'')}" placeholder="e.g. British Gas"></div>
    <div class="field"><label>type</label><select id="f-type">${typeOpts}</select></div>
    <div class="field mono"><label>account number</label><input id="f-acct" value="${esc(a.acct||'')}" placeholder="optional" inputmode="numeric"></div>
    <div class="field mono"><label>payment due day of month (1–31)</label><input id="f-due" value="${a.dueDay||''}" placeholder="e.g. 5" inputmode="numeric"></div>
    <div class="field"><label>typical amount (${CUR})</label><input id="f-amt" value="${a.amount!=null?a.amount:''}" placeholder="optional" inputmode="decimal"></div>
    <div class="field"><label>payment method</label><div class="seg" id="f-dd"><button type="button" data-dd="1" aria-pressed="${a.dd?'true':'false'}">direct debit</button><button type="button" data-dd="0" aria-pressed="${!a.dd?'true':'false'}">manual</button></div></div>
    <div class="field"><label>note</label><textarea id="f-note" placeholder="optional">${esc(a.note||'')}</textarea></div>
    <div class="sheetbtns"><button class="btn" type="button" id="f-cancel">cancel</button><button class="btn solid" type="button" id="f-save">save account</button></div>
  `);
  let dd=!!a.dd; $('f-dd').addEventListener('click',e=>{ const b=e.target.closest('[data-dd]'); if(!b)return; dd=b.dataset.dd==='1'; $('f-dd').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x===b?'true':'false')); });
  $('f-cancel').addEventListener('click',closeSheet);
  $('f-save').addEventListener('click',()=>{ const name=$('f-name').value.trim(); if(!name){ toast('give it a name'); return; }
    const due=parseInt($('f-due').value,10); const amt=parseFloat($('f-amt').value);
    const rec=existing||{id:uid(),entries:[]};
    rec.name=name; rec.type=$('f-type').value; rec.acct=$('f-acct').value.trim();
    rec.dueDay=(due>=1&&due<=31)?due:null; rec.amount=isNaN(amt)?null:amt; rec.dd=dd; rec.note=$('f-note').value.trim();
    if(!existing) DB.accounts.push(rec); save(); closeSheet(); renderAll(); toast(existing?'updated':'account added'); });
}

function entryForm(acctId){ const a=DB.accounts.find(x=>x.id===acctId); if(!a)return;
  openSheet(`
    <h3>Log a figure</h3><div class="sh">${esc(a.name)} · ${a.type}</div>
    <div class="field mono"><label>month</label><input id="e-ym" type="month" value="${curYM()}"></div>
    <div class="field"><label>amount paid / billed (${CUR})</label><input id="e-amt" placeholder="e.g. 84.20" inputmode="decimal"></div>
    <div class="field mono"><label>meter reading (optional)</label><input id="e-read" placeholder="for usage tracking" inputmode="decimal"></div>
    <div class="field"><label>note (optional)</label><input id="e-note" placeholder=""></div>
    <div class="sheetbtns"><button class="btn" type="button" id="e-cancel">cancel</button><button class="btn solid" type="button" id="e-save">save figure</button></div>
  `);
  $('e-cancel').addEventListener('click',closeSheet);
  $('e-save').addEventListener('click',()=>{ const ym=$('e-ym').value; if(!ym){ toast('pick a month'); return; }
    const amt=parseFloat($('e-amt').value); const read=parseFloat($('e-read').value); const note=$('e-note').value.trim();
    if(isNaN(amt)&&isNaN(read)&&!note){ toast('enter an amount or reading'); return; }
    a.entries=a.entries||[]; const ex=a.entries.find(e=>e.ym===ym);
    const val={ym, amount:isNaN(amt)?null:amt, reading:isNaN(read)?null:read, note};
    if(ex){ Object.assign(ex,val); } else { a.entries.push(val); }
    save(); closeSheet(); renderAll(); const el=$('ac-'+a.id); if(el)el.classList.add('open'); toast('figure logged'); });
}

// ── calendar (.ics) reminders ──────────────────────────────────────────────
function icsEscape(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
function dtUTC(d){ return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z'; }
function billVEVENT(a){ const due=a.dueDay||1; const nd=nextDue(due); const start=new Date(nd.getFullYear(),nd.getMonth(),nd.getDate(),9,0,0);
  const desc=`Pay ${a.name}${a.acct?' (a/c '+a.acct+')':''}${a.amount?' \u2014 ~'+CUR+a.amount:''}. Manual payment reminder from Utility Ledger.`;
  return ['BEGIN:VEVENT','UID:'+a.id+'@babar-ledger','DTSTAMP:'+dtUTC(new Date()),
    'DTSTART:'+dtLocalFloating(start),'DURATION:PT30M','RRULE:FREQ=MONTHLY;BYMONTHDAY='+due,
    'SUMMARY:'+icsEscape('Pay '+a.name+' ('+a.type+')'),'DESCRIPTION:'+icsEscape(desc),
    'BEGIN:VALARM','TRIGGER:-PT15H','ACTION:DISPLAY','DESCRIPTION:'+icsEscape('Bill due: '+a.name),'END:VALARM','END:VEVENT'].join('\r\n'); }
function dtLocalFloating(d){ return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00'; }
function icsWrap(events){ return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Babar//Utility Ledger//EN','CALSCALE:GREGORIAN'].concat(events).concat(['END:VCALENDAR']).join('\r\n'); }
function downloadICSforAccount(id){ const a=DB.accounts.find(x=>x.id===id); if(!a)return; download((a.name||'bill').replace(/\W+/g,'-').toLowerCase()+'-reminder.ics', icsWrap([billVEVENT(a)]),'text/calendar'); toast('calendar reminder downloaded'); }
function downloadICSall(){ const manual=DB.accounts.filter(a=>!a.dd&&a.dueDay); if(!manual.length){ toast('no manual bills with a due day'); return; } download('utility-reminders.ics', icsWrap(manual.map(billVEVENT)),'text/calendar'); toast(manual.length+' reminders downloaded'); }

// ── backup / restore ───────────────────────────────────────────────────────
function download(name,text,mime){ const b=new Blob([text],{type:mime||'text/plain'}); const u=URL.createObjectURL(b); const aEl=document.createElement('a'); aEl.href=u; aEl.download=name; document.body.appendChild(aEl); aEl.click(); aEl.remove(); setTimeout(()=>URL.revokeObjectURL(u),4000); }
// ── encrypted backup (AES-256-GCM + PBKDF2-SHA256) ──────────────────────────
const ENC_TAG='babar-aes-gcm-v1', KDF_ITER=300000, APP='ledger', FILEBASE='utility-ledger';
function cryptoOK(){ return !!(window.crypto&&crypto.subtle); }
function b64(buf){ const b=new Uint8Array(buf); let s=''; const CH=0x8000; for(let i=0;i<b.length;i+=CH) s+=String.fromCharCode.apply(null,b.subarray(i,i+CH)); return btoa(s); }
function unb64(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)); }
async function deriveKey(pass,salt,iter){ const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']); return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']); }
async function encryptBackup(obj,pass){ const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12)); const key=await deriveKey(pass,salt,KDF_ITER); const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(JSON.stringify(obj))); return JSON.stringify({_enc:ENC_TAG,app:APP,kdf:'PBKDF2',hash:'SHA-256',iter:KDF_ITER,salt:b64(salt),iv:b64(iv),ct:b64(ct)},null,2); }
async function decryptBackup(env,pass){ const key=await deriveKey(pass,unb64(env.salt),env.iter||KDF_ITER); const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(env.iv)},key,unb64(env.ct)); return JSON.parse(new TextDecoder().decode(pt)); }
const HINTCSS='font-family:var(--mono);font-size:9px;color:var(--dim);margin:-6px 0 13px;line-height:1.5';
function exportJSON(){ openSheet(`
  <h3>Backup</h3><div class="sh">save a copy of your data</div>
  <div class="field"><label>passphrase — optional</label><input id="bk-pass" type="password" autocomplete="new-password" placeholder="blank = plain readable file"></div>
  <div style="${HINTCSS}">A passphrase locks the file with AES-256 encryption — store it somewhere safe, there is no recovery if you forget it. Leave blank for a plain file.</div>
  <div class="sheetbtns"><button class="btn" id="bk-cancel" type="button">cancel</button><button class="btn solid" id="bk-go" type="button">save backup</button></div>`);
  $('bk-cancel').addEventListener('click',closeSheet);
  $('bk-go').addEventListener('click',async()=>{ const pass=$('bk-pass').value;
    try{ if(pass){ if(!cryptoOK()){ toast('encryption not available here'); return; } const txt=await encryptBackup(DB,pass); download(FILEBASE+'-encrypted-'+curYM()+'.json',txt,'application/json'); }
      else { download(FILEBASE+'-backup-'+curYM()+'.json',JSON.stringify(DB,null,2),'application/json'); }
      closeSheet(); toast(pass?'encrypted backup saved':'backup saved'); }catch(e){ toast('backup failed'); } }); }
function applyRestore(d){ if(!d||!Array.isArray(d.accounts)){ toast('not a ledger backup'); return; } DB=d; save(); renderAll(); toast('restored'); }
function promptDecrypt(env){ if(!cryptoOK()){ toast('encryption not available here'); return; }
  openSheet(`<h3>Encrypted backup</h3><div class="sh">enter the passphrase to restore</div>
    <div class="field"><label>passphrase</label><input id="rs-pass" type="password" autocomplete="off"></div>
    <div class="sheetbtns"><button class="btn" id="rs-cancel" type="button">cancel</button><button class="btn solid" id="rs-go" type="button">restore</button></div>`);
  $('rs-cancel').addEventListener('click',closeSheet);
  $('rs-go').addEventListener('click',async()=>{ try{ const obj=await decryptBackup(env,$('rs-pass').value); closeSheet(); applyRestore(obj); }catch(e){ toast('wrong passphrase or corrupt file'); } }); }
$('importBtn').addEventListener('click',()=>$('fileIn').click());
$('fileIn').addEventListener('change',e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ let d; try{ d=JSON.parse(r.result); }catch(err){ toast('could not read that file'); $('fileIn').value=''; return; } if(d&&d._enc){ promptDecrypt(d); } else { applyRestore(d); } $('fileIn').value=''; }; r.readAsText(f); });

// ── toast ──────────────────────────────────────────────────────────────────
let tT=null; function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),1900); }

// ── event delegation ───────────────────────────────────────────────────────
document.addEventListener('click',e=>{ const t=e.target;
  const tog=t.closest('[data-toggle]'); if(tog){ $('ac-'+tog.dataset.toggle).classList.toggle('open'); return; }
  const ae=t.closest('[data-add-entry]'); if(ae){ entryForm(ae.dataset.addEntry); return; }
  const ed=t.closest('[data-edit]'); if(ed){ accountForm(DB.accounts.find(a=>a.id===ed.dataset.edit)); return; }
  const dl=t.closest('[data-del]'); if(dl){ const a=DB.accounts.find(x=>x.id===dl.dataset.del); if(a&&confirm('Delete "'+a.name+'" and its figures?')){ DB.accounts=DB.accounts.filter(x=>x.id!==dl.dataset.del); save(); renderAll(); toast('deleted'); } return; }
  const de=t.closest('[data-del-entry]'); if(de){ const [id,ym]=de.dataset.delEntry.split('|'); const a=DB.accounts.find(x=>x.id===id); if(a){ a.entries=a.entries.filter(x=>x.ym!==ym); save(); renderAll(); const el=$('ac-'+id); if(el)el.classList.add('open'); } return; }
  const cal=t.closest('[data-cal]'); if(cal){ downloadICSforAccount(cal.dataset.cal); return; }
});
$('addAcct').addEventListener('click',()=>accountForm(null));
$('exportBtn').addEventListener('click',exportJSON);
$('calAllBtn').addEventListener('click',downloadICSall);

// ── boot ───────────────────────────────────────────────────────────────────
load(); if(!storageOK) warnStore(); renderAll();
</script>
</body>
